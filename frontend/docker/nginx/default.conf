# Docker 内置 DNS 解析器，用于运行时解析容器主机名
# 解决 nginx 启动时 backend 容器不可用的问题
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name localhost;

    # Gzip 压缩，提升传输效率
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ============================================
    # 前端静态资源
    # ============================================
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Vue Router History 模式：所有路由回退到 index.html
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # 后端 API 反向代理（运行时 DNS 解析）
    # ============================================
    location /api/ {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（AI 对话接口响应较慢，适当加大）
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # ============================================
    # WebSocket 反向代理（STOMP over SockJS）
    # ============================================
    location /ws/ {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        # WebSocket 协议升级必需的头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 长连接超时（单位：秒）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # /api/ws/ 端点兼容（前端可能使用 /api 前缀连接 WebSocket）
    location /api/ws/ {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ============================================
    # SSE（Server-Sent Events）反向代理（AI 流式输出）
    # ============================================
    location /api/ai/ {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 关闭缓冲，确保 SSE 事件实时推送
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # 静态资源缓存策略
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
